background {
    monitor =
    path = /home/iCode/.config/hypr/lockscreen/poimandres.png   # supports png, jpg, webp (no animations, though)
    color = rgba(25, 20, 20, 1.0)

    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    blur_passes = 3 # 0 disables blurring
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %d %b')"
    text_align = center # center/right or any value for default left. multi-line text alignment inside label container
    color = rgba(255, 255, 255, 1.0)
    font_size = 12
    font_family = Material Symbols Outlined
    rotate = 0 # degrees, counter-clockwise

    position = 0, 300
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%I:%M')"
    text_align = center # center/right or any value for default left. multi-line text alignment inside label container
    color = rgba(255, 255, 255, 1.0)
    font_size = 45
    font_family = Material Symbols Outlined
    rotate = 0 # degrees, counter-clockwise

    position = 0, 240
    halign = center
    valign = center
}

image {
    monitor =
    path = /home/iCode/.config/hypr/lockscreen/ibu-poi.jpeg   # supports png, jpg, webp (no animations, though)
    size = 250 # lesser side if not 1:1 ratio
    rounding = -1 # negative values mean circle
    border_size = 2
    border_color = rgb(221, 221, 221)
    rotate = 0 # degrees, counter-clockwise
    reload_time = -1 # seconds between reloading, 0 to reload with SIGUSR2
    reload_cmd =  # command to get new path. if empty, old path will be used. don't run "follow" commands like tail -F

    position = 0, 50
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(/home/iCode/.config/hypr/scripts/battery.sh)"
    text_align = center # center/right or any value for default left. multi-line text alignment inside label container
    color = rgba(255, 255, 255, 1.0)
    font_size = 15
    font_family = JetBrains Mono Nerd Font
    rotate = 0 # degrees, counter-clockwise

    position = 0, -130
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:30000] echo "$(motivate | sed $'s/\033\[[0-9;]*m//g' | fold -s -w120)"
    text_align = center # center/right or any value for default left. multi-line text alignment inside label container
    color = rgba(255, 255, 255, 1.0)
    font_size = 12
    font_family = JetBrains Mono Nerd Font
    rotate = 0 # degrees, counter-clockwise

    position = 0, -200
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 0
    dots_size = 0.25 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, -1.0 - 1.0
    dots_center = true
    dots_rounding = -1 # -1 default circle, -2 follow input-field rounding
    dots_fade_time = 200 # Milliseconds until a dot fully fades in
    dots_text_format = # Text character used for the input indicator. Leave empty for a rectangle that will be rounded via dots_rounding (default).
    outer_color = rgba(255, 255, 255, 1)
    inner_color = rgba(255, 99, 71, 0)
    font_color = rgb(255, 255, 255)
    font_family = Material Symbols Outlined # Font used for placeholder_text, fail_text and dots_text_format.
    fade_on_empty = true
    fade_timeout = 1000 # Milliseconds before fade_on_empty is triggered.
    placeholder_text = Password ... # Text rendered in the input box when it's empty.
    hide_input = false
    rounding = -1 # -1 means complete rounding (circle/oval)
    check_color = rgba(255, 99, 71, 0)
    fail_color = rgba(255, 99, 71, 1) # if authentication failed, changes outer_color and fail message color
    fail_text = <i>"Failed : " <b>$ATTEMPTS</b></i> # can be set to empty
    fail_timeout = 2000 # milliseconds before fail_text and fail_color disappears
    fail_transition = 3000 # transition time in ms between normal outer_color and fail_color
    capslock_color = rgba(255, 99, 71, 0.7)
    numlock_color = -1
    bothlock_color = -1 # when both locks are active. -1 means don't change outer color (same for above)
    invert_numlock = false # change color if numlock is off
    swap_font_color = false # see below

    position = 0, -320
    halign = center
    valign = center
}
