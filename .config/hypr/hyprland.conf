
# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,auto


###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
# $menu = wofi --show drun
$menu = tofi-drun


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = nm-applet &
exec-once=systemctl --user start plasma-polkit-agent
exec-once = mako
exec-once = blueman-applet
exec-once = wl-paste --watch cliphist store
exec-once = swww init
# exec-once = waybar
exec-once = /home/iCode/.config/hypr/scripts/alarm.sh

exec-once = [workspace 1 silent] $terminal --title TMUX -o background_opacity=0.0 bash -c "tmux attach"
exec-once = [workspace 2 silent] qutebrowser
exec-once = [workspace 3 silent] $terminal

exec-once = /home/iCode/.config/hypr/scripts/logintime.sh

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general { 
    gaps_in = 5
    gaps_out = 20

    border_size = 1

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false 

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
    new_on_top = true
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc { 
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = ctrl:nocaps
    kb_rules =

    follow_mouse = 0
    repeat_delay = 600

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    workspace_swipe = false
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier
$multiMod = ALT

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, BACKSPACE, exec, $terminal --title TMUX -o background_opacity=0.0 bash -c "tmux attach"
bind = $mainMod SHIFT, BACKSPACE, exec, $terminal --title TMUX bash -c "tmux new"
bind = $mainMod, Q, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, UP, togglefloating,
bind = $mainMod, SPACE, exec, $menu | xargs hyprctl dispatch exec --
bind = $mainMod, F, fullscreen
bind = $mainMod, Escape, exec, /home/iCode/.config/hypr/scripts/unistart.sh wlogout
bind = $mainMod, X, exec, /home/iCode/.config/hypr/scripts/unistart.sh waybar

# Multitask
bind = $multiMod, R, exec, /home/iCode/.config/hypr/scripts/alarm.sh
bind = $multiMod, M, exec, $terminal --title MULTITASK bash -c "/home/iCode/media/music.sh multitask"
bind = $multiMod SHIFT, M, exec, $terminal --title MOVIE bash -c "/home/iCode/media/music.sh movie"
bind = $multiMod, Q, exec, /home/iCode/.config/hypr/scripts/multitask.sh stop
bind = $multiMod, Z, exec, /home/iCode/.config/hypr/scripts/multitask.sh pause
bind = $multiMod, H, exec, /home/iCode/.config/hypr/scripts/multitask.sh step-backward
bind = $multiMod SHIFT, H, exec, /home/iCode/.config/hypr/scripts/multitask.sh jump-backward
bind = $multiMod, L, exec, /home/iCode/.config/hypr/scripts/multitask.sh step-forward
bind = $multiMod SHIFT, L, exec, /home/iCode/.config/hypr/scripts/multitask.sh jump-forward

# bind = $mainMod, P, pseudo, # dwindle
# bind = $mainMod, J, togglesplit, # dwindle
# bind = $mainMod, M, exit,

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, TAB, togglespecialworkspace, magic
bind = $mainMod SHIFT, TAB, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
# bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%+
# bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-
# bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
# bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
# bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindel = ,F1, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,F2, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-
bindel = ,F3, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%+
bindel = ,F4, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,F11, exec, ~/.config/hypr/scripts/brightness.sh --dec
bindel = ,F12, exec, ~/.config/hypr/scripts/brightness.sh --inc
bindel = SHIFT ,F11, exec, ~/.config/hypr/scripts/brightness.sh --min
bindel = SHIFT ,F12, exec, ~/.config/hypr/scripts/brightness.sh --max

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

workspace = 1, rounding:false, bordersize:0, shadow:false, animation: false
workspace = 2, bordersize:0, shadow:false,

windowrule = workspace 1, mpv
windowrule = float, mpv
windowrule = nofocus, mpv
windowrule = size 99% 99%, mpv
windowrule = noinitialfocus, mpv

# Example windowrule v1
windowrule = workspace 1, title:^(TMUX)$
windowrule = float, title:^(TMUX)$
windowrule = center, title:^(TMUX)$
windowrule = size 100% 100%, title:^(TMUX)$
windowrule = stayfocused, title:^(TMUX)$

windowrule = workspace 2, qutebrowser
windowrule = float, qutebrowser
windowrule = center, qutebrowser
windowrule = size 100% 100%, qutebrowser
windowrule = noborder, qutebrowser
windowrule = noshadow, qutebrowser

windowrule = workspace 7, title:^(UPDATE-SYS)$
windowrule = float, title:^(UPDATE-SYS)$
windowrule = fullscreen, title:^(UPDATE-SYS)$
windowrule = noborder, title:^(UPDATE-SYS)$
windowrule = noshadow, title:^(UPDATE-SYS)$

windowrule = workspace 9, title:^(MULTITASK)$
windowrule = float, title:^(MULTITASK)$
windowrule = center, title:^(MULTITASK)$
windowrule = size 100% 100%, title:^(MULTITASK)$
windowrule = stayfocused, title:^(MULTITASK)$

windowrule = workspace 10, title:^(MOVIE)$
windowrule = float, title:^(MOVIE)$
windowrule = center, title:^(MOVIE)$
windowrule = size 100% 100%, title:^(MOVIE)$
windowrule = stayfocused, title:^(MOVIE)$

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$

windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.

source = ~/.config/hypr/run-time/multitask
